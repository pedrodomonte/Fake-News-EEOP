<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fake News EEOP</title>

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <div id="container">

      <div id="profile"> 
        <img src="./assets/avatar.png" alt="Profile Picture">
        <p>Fake News EEOP</p>
        <p2>Aprenda a identificar, evitar e entender o impacto das fake news</p2>
      </div>

      <div id="links">
        <ul>

          <li>
            <a href="#" onclick="abrirModal('O que é Fake News?', '1WqQw59htVeCbABq24UuH0EI9N6oTWvwQ'); return false;">
              <i class="fa-solid fa-share-nodes"></i>O que é Fake News?
            </a>
          </li>

          <li>
            <a href="#" onclick="abrirModal('Como identificar Fake News?', '1dcCiPM_uZ_c_SRso0YFj7Q6nUw7gJ1xa'); return false;">
              <i class="fa-solid fa-search"></i>Como identificar Fake News?
            </a>
          </li>

          <li>
            <a href="#" onclick="abrirModal('Como evitar compartilhar Fake News?', '1Dypl_ft_6KdUtd6LNBNR375rtfaNFtC1'); return false;">
              <i class="fa-solid fa-ban"></i>Como evitar compartilhar Fake News?
            </a>
          </li>

          <li>
            <a href="#" onclick="abrirModal('Como as Fake News afetam a sociedade?', '1_3oex86EJn47sP7e3D9gDRkASLjDeS9z'); return false;">
              <i class="fa-solid fa-users"></i>Como as Fake News afetam a sociedade?
            </a>
          </li>

        </ul>
      </div>

      <footer>
        Site feito por
        <a href="https://www.linkedin.com/in/pedro-do-monte-a228663ba/" target="_blank">
          Pedro do Monte
        </a>
      </footer>

    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
      <div class="modal-content" id="janela">
        <span class="fechar" onclick="fecharModal()">&times;</span>
        <h2 id="barraTopo">Título</h2>
        <div id="conteudoModal"></div>
      </div>
    </div>

    <!-- SCRIPT -->
    <script>
      function abrirModal(titulo, idDrive) {
        document.getElementById("modal").style.display = "block";
        document.getElementById("barraTopo").innerText = titulo;

        document.getElementById("conteudoModal").innerHTML = `
          <iframe 
            src="https://drive.google.com/file/d/${idDrive}/preview"
            width="100%" 
            height="100%" 
            style="border:none; border-radius:10px;">
          </iframe>
        `;
      }

      function fecharModal() {
        document.getElementById("modal").style.display = "none";
      }

      // fechar clicando fora
      window.onclick = function(event) {
        const modal = document.getElementById("modal");
        if (event.target === modal) {
          modal.style.display = "none";
        }
      }

      // ARRASTAR
      let posX=0,posY=0,mouseX=0,mouseY=0;

      const janela = document.getElementById("janela");
      const barra = document.getElementById("barraTopo");

      barra.onmousedown = function(e){
        e.preventDefault();
        mouseX = e.clientX;
        mouseY = e.clientY;

        document.onmouseup = () => document.onmousemove = null;

        document.onmousemove = function(e){
          posX = mouseX - e.clientX;
          posY = mouseY - e.clientY;
          mouseX = e.clientX;
          mouseY = e.clientY;

          janela.style.top = (janela.offsetTop - posY) + "px";
          janela.style.left = (janela.offsetLeft - posX) + "px";
        }
      }
    </script>

  </body>
</html>
